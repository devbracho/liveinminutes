version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Wait this many days after a release before opening a PR. Keeps Dependabot
    # (and the auto-merge workflow) from landing packages that are newer than the
    # local pnpm `minimumReleaseAge` supply-chain policy will let us install.
    cooldown:
      default-days: 7
    groups:
      next:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "tw-animate-css"]
      supabase:
        patterns: ["@supabase/*"]
      drizzle:
        patterns: ["drizzle-orm", "drizzle-kit", "postgres", "@types/pg"]
      dev-tooling:
        patterns: ["@biomejs/*", "typescript", "@types/node"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
