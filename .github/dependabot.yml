version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "react", "react-dom", "@types/react*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "tw-animate-css"]
      supabase:
        patterns: ["@supabase/*"]
      drizzle:
        patterns: ["drizzle-orm", "drizzle-kit", "postgres", "@types/pg"]
      dev-tooling:
        patterns: ["@biomejs/*", "typescript", "@types/node"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
